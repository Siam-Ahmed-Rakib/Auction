services:
  - type: web
    name: auction-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard: postgresql+asyncpg://user:pass@host:5432/postgres
      - key: DIRECT_URL
        sync: false  # Set in Render dashboard: postgresql+asyncpg://user:pass@host:5432/postgres
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_ALGORITHM
        value: HS256
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false  # Set in Render dashboard: https://your-app.vercel.app
