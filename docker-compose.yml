services:
  postgres:
    image: postgres:16-alpine
    container_name: auction-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auction_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: auction-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres.lmthclkskkechzyfenuf:2105158%40CSE.BUET%3EAC%3EBD@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
      DIRECT_URL: postgresql+asyncpg://postgres:2105158%40CSE.BUET%3EAC%3EBD@db.lmthclkskkechzyfenuf.supabase.co:5432/postgres
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./fontend
    container_name: auction-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
